name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build
        run: ./build.sh

      - name: Package zip
        run: cd build && ditto -c -k --keepParent SuperOpt.app SuperOpt.zip

      - name: Generate release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || git rev-list --max-parents=0 HEAD)
          echo "## Changes" > notes.md
          git log --format="- %h %s" "${PREV_TAG}..HEAD" --invert-grep --grep="chore: update cask" >> notes.md
          echo "" >> notes.md
          echo "**Full Changelog**: https://github.com/logonoff/superopt/compare/${PREV_TAG}...${{ github.ref_name }}" >> notes.md

      - name: Create release
        run: gh release create "${{ github.ref_name }}" build/SuperOpt.zip --title "${{ github.ref_name }}" --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew cask
        run: |
          SHA=$(shasum -a 256 build/SuperOpt.zip | awk '{print $1}')
          sed -i '' "s/version \".*\"/version \"${{ github.ref_name }}\"/" Casks/superopt.rb
          sed -i '' "s/sha256 \".*\"/sha256 \"${SHA}\"/" Casks/superopt.rb
          CONTENT=$(base64 < Casks/superopt.rb)
          MAIN_OID=$(gh api graphql -f query='{ repository(owner:"logonoff", name:"superopt") { ref(qualifiedName:"refs/heads/main") { target { oid } } } }' --jq '.data.repository.ref.target.oid')
          gh api graphql -f query='
            mutation($input: CreateCommitOnBranchInput!) {
              createCommitOnBranch(input: $input) { commit { oid } }
            }' -f 'variables={
              "input": {
                "branch": { "repositoryNameWithOwner": "logonoff/superopt", "branchName": "main" },
                "expectedHeadOid": "'"$MAIN_OID"'",
                "message": { "headline": "chore: update cask to ${{ github.ref_name }}" },
                "fileChanges": {
                  "additions": [{ "path": "Casks/superopt.rb", "contents": "'"$CONTENT"'" }]
                }
              }
            }'
          git pull --ff-only origin main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if next branch can be fast-forwarded
        id: check-next
        run: |
          if git ls-remote --exit-code origin next &>/dev/null; then
            git fetch origin next
            if git merge-base --is-ancestor origin/next HEAD; then
              echo "can_ff=true" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Fast-forward next branch
        if: steps.check-next.outputs.can_ff == 'true'
        run: git push origin HEAD:next
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - id: deployment
        uses: actions/deploy-pages@v5

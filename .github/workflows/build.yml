name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: ./build.sh

      - name: Package zip
        run: cd build && ditto -c -k --keepParent OptWin.app OptWin.zip

      - name: Create draft release
        run: gh release create "${{ github.ref_name }}" build/OptWin.zip --draft --title "${{ github.ref_name }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
